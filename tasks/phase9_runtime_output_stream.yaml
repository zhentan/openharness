id: phase9_runtime_output_stream
title: Phase 9 shared runtime output stream via adversarial TDD
priority: high
depends_on:
  - phase9_review_runtime_output_stream
evaluate: true
agent_prompt: |
  Implement the shared runtime output-stream slice as the generator in a
  reviewer-first adversarial TDD workflow.

  Required context:
  - docs/plan/phase9-dashboard-dogfood-plan.md
  - docs/plan/phase9-agent-execution-plan.md
  - CLAUDE.md
  - relevant runtime, supervisor, and websocket code
  - docs/phase9/reviews/runtime-output-stream.md

  Required process:
  1. Consume reviewer-authored constraints from docs/phase9/reviews/runtime-output-stream.md before implementation.
  2. Add failing tests first.
  3. Implement the minimum runtime changes needed.
  4. Run focused validation.
  5. Leave a handoff at docs/phase9/handoffs/runtime-output-stream.md.

  Your handoff artifact must include:
  - the reviewer artifact you consumed
  - tests added first
  - implementation files changed
  - focused validation run
  - remaining risks or follow-ups

  Scope for this slice:
  - expose live output for active tasks through the runtime transport
  - make unsubscribe/disconnect behavior explicit
  - keep the contract shared so later browser and TUI surfaces can both consume it

  Do not implement dashboard UI in this slice.
success_criteria:
  - Reviewer constraints exist before implementation code is added.
  - The generator consumes docs/phase9/reviews/runtime-output-stream.md and leaves a handoff at docs/phase9/handoffs/runtime-output-stream.md.
  - Tests fail first for live output subscription behavior.
  - The runtime exposes a shared live-output contract without browser-only assumptions.
  - Focused validation covers subscribe, unsubscribe, and disconnect behavior.
escalation_rules:
  - Escalate if a clean shared output contract cannot be implemented without widening scope into UI work.
  - Escalate if reviewer constraints are too vague to constrain transport semantics.
exploration_budget:
  max_attempts: 3
  timeout_per_attempt: 45
  total_timeout: 120

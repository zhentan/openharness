id: phase9_dashboard_task_detail
title: Phase 9 selected-task detail and output view via adversarial TDD
priority: medium
depends_on:
  - phase9_review_task_detail
  - phase9_dashboard_summary_grid
evaluate: true
agent_prompt: |
  Implement the selected-task detail slice for Phase 9 as the generator in a
  reviewer-first adversarial TDD workflow.

  Required context:
  - docs/plan/phase9-dashboard-dogfood-plan.md
  - docs/plan/phase9-agent-execution-plan.md
  - docs/plan/phase9-dashboard-design-guidelines.md
  - CLAUDE.md
  - current dashboard scaffold and summary grid implementation
  - runtime websocket contract for get-task and related task inspection paths

  Required process:
  1. Obtain reviewer-authored acceptance criteria or reviewer-authored test
      intent from docs/phase9/reviews/task-detail.md before implementation.
  2. Add failing tests first.
  3. Implement the smallest change set that passes them.
    4. Run focused validation.
    5. Leave clear reviewer notes in docs/phase9/handoffs/task-detail.md.

    Your handoff artifact must include:
    - the reviewer artifact you consumed
    - tests added first
    - implementation files changed
    - focused validation run
    - remaining risks or follow-ups

  Scope for this slice:
  - allow stable selection from the summary list
  - show fuller state for the selected task
  - surface quiet-versus-active run-health truthfully for running tasks
  - include live or recent output or logs needed for diagnosis
  - handle missing, deleted, or changing task state cleanly

  Do not add broad historical analytics or agent-specific UI branching.

  Keep the layout aligned with the design guideline that output is diagnostic,
  detail is subordinate to monitoring, and the UI must not become chat-first.
success_criteria:
  - Reviewer constraints exist before implementation code for task detail is added.
  - The generator consumes docs/phase9/reviews/task-detail.md and leaves a handoff at docs/phase9/handoffs/task-detail.md.
  - Tests fail first for selection stability, live detail updates, and missing-task handling.
  - The selected-task panel remains synchronized with runtime changes.
  - The selected-task panel shows run-health without inventing browser-only heuristics.
  - Operators can inspect task output or logs without leaving the browser.
  - High-volume output handling is either safe and tested or explicitly escalated as a runtime/product gap before implementation proceeds.
  - The slice preserves monitoring-first density in the overall layout.
escalation_rules:
  - Escalate if the runtime does not yet expose enough task detail, run-health, or output to avoid UI guesswork.
  - Escalate if reviewer criteria do not cover deleted-task behavior or output visibility.
  - Escalate if the slice starts collapsing into a chat-first layout instead of an operator-detail view.
exploration_budget:
  max_attempts: 3
  timeout_per_attempt: 45
  total_timeout: 120
